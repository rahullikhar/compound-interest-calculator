name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t compound-interest-calculator .

      - name: Copy build files
        run: |
          mkdir -p ./output
          docker run --rm \
            -v $(pwd)/output:/output \
            compound-interest-calculator \
            cp /usr/share/nginx/html/index.html /output/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
